logging:
  level:
    net.ttddyy.dsproxy.listener: DEBUG
    org.apache.hc.client5.http: DEBUG

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ordering
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  http:
    clients:
      imperative:
        factory: http_components
    serviceclient:
      product-catalog:
        base-url: http://localhost:8787
      rapidex:
        base-url: http://localhost:8787
        connect-timeout: 3s
        read-timeout: 7s

algashop:
  integrations:
    product-catalog:
      provider: PRODUCT_CATALOG
    shipping:
      provider: RAPIDEX