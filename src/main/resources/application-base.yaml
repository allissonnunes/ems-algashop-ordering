management:
  endpoint:
    health:
      show-details: always
      group:
        readiness:
          include:
            - db
            - readinessState
        liveness:
          include:
            - livenessState
      status:
        order: DOWN, OUT_OF_SERVICE, DEGRADED, UP, UNKNOWN
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
  health:
    redis:
      enabled: false

spring:
  application:
    name: ordering
  cloud:
    circuitbreaker:
      http-services:
        enabled: false
  flyway:
    enabled: false
  http:
    clients:
      imperative:
        factory: http_components
    serviceclient:
      product-catalog:
        connect-timeout: 2s
        read-timeout: 5s
      rapidex:
        connect-timeout: 3s
        read-timeout: 7s
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyComponentPathImpl
    open-in-view: false
    show-sql: false
  web:
    locale-resolver: fixed
    locale: en_US

algashop:
  integrations:
    product-catalog:
      provider: PRODUCT_CATALOG
    shipping:
      provider: RAPIDEX